<!DOCTYPE html>
<html>
<head>
  <title>YPSS CLASS Loading</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #8b0000, #3b0000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .loader {
      margin-top: 20px;
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .text {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.85;
    }

    .bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      margin-top: 25px;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: white;
      animation: load 3s ease forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <head>
    <img src="images/logo.png" style="width:120px;">
  </head>

  <div class="logo">🎓 YPSS CLASS</div>

  <div class="loader"></div>

  <div class="text">Loading your learning platform...</div>

  <div class="bar">
    <div class="fill"></div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "login.html";
    }, 3200);
  </script>

</body>
</html>
